<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Feed</title>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0f172a;
      --border: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #dbeafe 0%, var(--bg) 55%);
      color: var(--text);
      padding: 32px 20px;
    }

    .shell {
      max-width: 1100px;
      margin: 0 auto;
    }

    .hero {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .actions a {
      text-decoration: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      font-size: 14px;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      background: #fff;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.06);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 16px;
      background: #e2e8f0;
      margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 20px;
    }

    .meta {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .card-actions a,
    .card-actions button {
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      border: 0;
      cursor: pointer;
      text-decoration: none;
    }

    .watch {
      background: #ef4444;
      color: #fff;
    }

    .stream {
      background: #111827;
      color: #fff;
    }

    .views {
      background: #e2e8f0;
      color: #0f172a;
    }

    .status {
      color: var(--muted);
      margin-top: 16px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <h1>Video Feed</h1>
      <p>This feed is backed by MongoDB metadata, creator info, and engagement counts generated during upload and playback.</p>
      <div class="actions">
        <a class="primary" href="/client/upload.html">Upload Video</a>
        <a class="secondary" href="/client/dashboard.html">Open Dashboard</a>
      </div>
    </div>

    <div id="feed" class="grid"></div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const feed = document.getElementById("feed");
    const status = document.getElementById("status");

    const incrementViews = async (videoId) => {
      await fetch(`/api/videos/${videoId}/view`, {
        method: "POST"
      });
    };

    const renderVideoCard = (video) => {
      const article = document.createElement("article");
      article.className = "card";
      article.innerHTML = `
        <img class="thumb" src="${video.thumbnailUrl || ""}" alt="${video.title} thumbnail" onerror="this.style.display='none'" />
        <div class="eyebrow">${video.status}</div>
        <h2>${video.title}</h2>
        <div class="meta">${video.creatorName} | ${video.views} views | ${video.likes} likes | ${video.commentsCount} comments</div>
        <p>${video.description || "No description yet."}</p>
        <div class="card-actions">
          <a class="watch" href="/client/watch.html?videoId=${encodeURIComponent(video.videoId)}">Watch</a>
          <a class="stream" href="/client/dashboard.html?creatorName=${encodeURIComponent(video.creatorName)}">Creator</a>
          <button class="views" data-video-id="${video.videoId}">Add View</button>
        </div>
      `;

      article.querySelector("button").addEventListener("click", async () => {
        await incrementViews(video.videoId);
        window.location.reload();
      });

      return article;
    };

    const loadFeed = async () => {
      status.textContent = "Loading videos...";

      try {
        const response = await fetch("/api/videos/feed");
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Unable to load feed.");
        }

        feed.innerHTML = "";

        if (!data.videos.length) {
          status.textContent = "No videos yet. Upload one to populate the feed.";
          return;
        }

        data.videos.forEach((video) => {
          feed.appendChild(renderVideoCard(video));
        });

        status.textContent = `${data.videos.length} video(s) loaded.`;
      } catch (error) {
        status.textContent = error.message;
      }
    };

    loadFeed();
  </script>
</body>
</html>
