<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibecast</title>
  <link rel="icon" type="image/png" href="/client/vibecast-logo.png" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root {
      --bg: #0b0b0b;
      --bg-elevated: #121212;
      --panel: #181818;
      --panel-soft: #202020;
      --panel-strong: #272727;
      --border: #2f2f2f;
      --text: #f5f5f5;
      --muted: #a1a1aa;
      --accent: #ff2d55;
      --accent-soft: rgba(255, 45, 85, 0.18);
      --accent-gold: #f59e0b;
      --glow: rgba(255, 45, 85, 0.22);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      --shadow-soft: 0 16px 40px rgba(0, 0, 0, 0.25);
      --radius-lg: 26px;
      --radius-md: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(255, 45, 85, 0.18), transparent 24%),
        radial-gradient(circle at top right, rgba(82, 82, 91, 0.16), transparent 22%),
        radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.07), transparent 30%),
        linear-gradient(180deg, #111111 0%, #090909 100%);
      color: var(--text);
      font-family: "Segoe UI Variable", "Aptos", "Trebuchet MS", sans-serif;
    }

    body[data-theme="light"] {
      --bg: #f5f5f7;
      --bg-elevated: #ffffff;
      --panel: #ffffff;
      --panel-soft: #f2f2f3;
      --panel-strong: #e8e8ea;
      --border: #d7d7db;
      --text: #151515;
      --muted: #5f6470;
      --accent-soft: rgba(255, 45, 85, 0.12);
      --shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      --shadow-soft: 0 16px 40px rgba(15, 23, 42, 0.1);
      background:
        radial-gradient(circle at top left, rgba(255, 45, 85, 0.08), transparent 24%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.08), transparent 22%),
        radial-gradient(circle at 50% 0%, rgba(245, 158, 11, 0.05), transparent 30%),
        linear-gradient(180deg, #fcfcfd 0%, #eff1f5 100%);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      opacity: 0.28;
      z-index: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0));
      position: relative;
      z-index: 1;
    }

    .app-shell.watch-mode {
      grid-template-columns: minmax(0, 1fr);
    }

    .app-shell.watch-mode .sidebar {
      display: none;
    }

    .app-shell.watch-mode .chip-row {
      display: none;
    }

    .app-shell.watch-mode .main {
      padding: 0 0 18px;
    }

    .app-shell.watch-mode.sidebar-overlay-open .sidebar {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      height: 100vh;
      z-index: 45;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      animation: sidebarSlideIn 0.18s ease;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 10px 8px 18px;
      background: linear-gradient(180deg, rgba(16,16,16,0.96), rgba(10,10,10,0.96));
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(22px);
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .sidebar-scrim {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.48);
      backdrop-filter: blur(2px);
      z-index: 40;
    }

    .sidebar-scrim[hidden] {
      display: none;
    }

    .sidebar::-webkit-scrollbar {
      width: 0;
      height: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px 14px;
      margin-bottom: 4px;
      position: relative;
      cursor: pointer;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      overflow: hidden;
      flex-shrink: 0;
      background: transparent;
    }

    .brand-mark img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center;
      transform: none;
    }

    .brand-copy strong {
      display: block;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-shadow: 0 0 24px rgba(255, 255, 255, 0.06);
    }

    .brand-copy span {
      color: var(--muted);
      font-size: 11px;
      display: none;
    }

    .sidebar-group {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .nav-button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
      font-size: 15px;
      font-weight: 600;
    }

    .nav-button:hover,
    .nav-button.active {
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      transform: translateX(3px);
    }

    .nav-icon {
      width: 26px;
      text-align: center;
      color: #f3f4f6;
      font-size: 18px;
    }

    .sidebar-divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
      margin: 10px 0 14px;
    }

    .sidebar-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px;
      color: #f4f4f5;
      font-size: 15px;
      font-weight: 700;
    }

    .creator-list {
      display: grid;
      gap: 2px;
      margin-top: 4px;
    }

    .creator-chip {
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 14px;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .creator-chip:hover {
      background: rgba(255,255,255,0.05);
    }

    .creator-avatar {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
    }

    .creator-copy {
      min-width: 0;
    }

    .creator-copy strong {
      display: block;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .creator-chip span {
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .main {
      padding: 0 0 28px;
    }

    .topbar {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0;
      padding: 10px 18px;
      position: sticky;
      top: 0;
      background: linear-gradient(180deg, rgba(14,14,14,0.96), rgba(14,14,14,0.82));
      backdrop-filter: blur(22px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 5;
    }

    .topbar-left,
    .topbar-center,
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-center {
      flex: 1;
      justify-content: center;
    }

    .topbar-brand {
      display: none;
      align-items: center;
      gap: 8px;
      border: 0;
      background: transparent;
      color: var(--text);
      padding: 0;
      min-width: 0;
    }

    .topbar-brand img {
      width: 30px;
      height: 30px;
      object-fit: contain;
      display: block;
    }

    .topbar-brand strong {
      display: block;
      font-size: 15px;
      line-height: 1;
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    .app-shell.watch-mode .topbar-brand {
      display: inline-flex;
    }

    .menu-toggle,
    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 0;
      background: transparent;
      color: #fff;
      font-size: 20px;
      display: grid;
      place-items: center;
    }

    .icon-button svg,
    .search-submit svg,
    .menu-toggle svg {
      width: 20px;
      height: 20px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .profile-button {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      flex-shrink: 0;
    }

    .profile-button img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .menu-toggle:hover,
    .icon-button:hover {
      background: rgba(255,255,255,0.08);
      transform: translateY(-1px);
    }

    .search-wrap {
      flex: 1;
      max-width: 920px;
      display: flex;
      align-items: center;
      background: linear-gradient(180deg, rgba(22,22,22,0.95), rgba(16,16,16,0.95));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .search-wrap input {
      flex: 1;
      background: transparent;
      border: 0;
      outline: none;
      color: var(--text);
      padding: 0 18px;
      font-size: 20px;
      height: 52px;
    }

    .search-submit {
      width: 64px;
      height: 52px;
      border: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      color: #fff;
      display: grid;
      place-items: center;
    }

    .user-menu {
      position: absolute;
      top: 72px;
      right: 18px;
      width: 360px;
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      background: #282828;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      padding: 14px 0;
      z-index: 20;
      overflow-x: visible;
    }

    .user-menu[hidden] {
      display: none;
    }

    .notifications-panel {
      position: absolute;
      top: 72px;
      right: 72px;
      width: 700px;
      max-width: calc(100vw - 32px);
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      background: #282828;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      z-index: 19;
    }

    .notifications-panel[hidden] {
      display: none;
    }

    .notifications-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .notifications-header h2 {
      margin: 0;
      font-size: 18px;
    }

    .notifications-list {
      display: grid;
    }

    .notification-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: #f5f5f5;
      text-align: left;
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) 128px;
      gap: 16px;
      padding: 18px 22px;
      align-items: start;
    }

    .notification-item:hover {
      background: #343434;
    }

    .notification-avatar {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      overflow: hidden;
    }

    .notification-title {
      font-size: 15px;
      line-height: 1.45;
      color: #f5f5f5;
      margin-bottom: 10px;
    }

    .notification-time {
      font-size: 13px;
      color: #a1a1aa;
    }

    .notification-thumb {
      width: 128px;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      object-fit: cover;
      background: #1f1f1f;
      display: block;
    }

    .notifications-empty {
      padding: 24px 22px 30px;
      color: #a1a1aa;
    }

    .user-menu-header {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 14px;
      padding: 8px 22px 18px;
    }

    .user-menu-avatar {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      overflow: hidden;
    }

    .user-menu-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .user-menu-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .user-menu-handle {
      color: #d4d4d8;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .user-menu-link {
      color: #60a5fa;
      font-size: 15px;
      border: 0;
      padding: 0;
      background: transparent;
      text-align: left;
    }

    .user-menu-divider {
      height: 1px;
      margin: 14px 0;
      background: rgba(255, 255, 255, 0.12);
    }

    .user-menu-list {
      display: grid;
    }

    .user-menu-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 22px;
      text-align: left;
      font-size: 15px;
    }

    .user-menu-item:hover {
      background: #343434;
    }

    .user-menu-item-left {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .user-menu-item-icon {
      width: 24px;
      text-align: center;
      font-size: 18px;
      color: #f4f4f5;
    }

    .user-menu-item-arrow {
      color: #d4d4d8;
      font-size: 18px;
    }

    .user-menu-submenu {
      position: fixed;
      width: 320px;
      max-height: min(520px, calc(100vh - 32px));
      background: #282828;
      border-radius: 22px;
      padding: 14px 0;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      z-index: 30;
      overflow-y: auto;
    }

    .user-menu-submenu[hidden] {
      display: none;
    }

    .user-menu-submenu-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 22px 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      margin-bottom: 10px;
    }

    .user-menu-back {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 0;
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .user-menu-submenu-title {
      font-size: 17px;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .user-menu-submenu {
        width: min(320px, calc(100vw - 24px));
      }
    }

    .top-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .pill-button,
    .upload-submit {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 700;
    }

    .pill-button {
      background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      color: var(--text);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .pill-button.accent,
    .upload-submit {
      background: linear-gradient(135deg, #ff1744, #ff4d6d);
      color: #fff;
      box-shadow: 0 16px 30px rgba(255, 45, 85, 0.24);
    }

    .pill-button:hover,
    .upload-submit:hover,
    .watch-pill:hover,
    .watch-icon-pill:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.22);
    }

    .content {
      display: grid;
      gap: 18px;
      padding: 14px 24px 0;
      animation: pageFadeIn 0.45s ease;
    }

    .panel,
    .video-card,
    .comment-card,
    .stat-card,
    .upload-card {
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .panel,
    .upload-card {
      border-radius: var(--radius-lg);
    }

    .hero-copy h1,
    .panel h1,
    .panel h2,
    .upload-card h1,
    .upload-card h2 {
      margin: 0 0 10px;
    }

    .hero-copy p,
    .muted {
      color: var(--muted);
      line-height: 1.6;
    }

    .inline-actions,
    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #ffd1dc;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }

    .chip-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 12px 24px 8px;
      position: sticky;
      top: 64px;
      z-index: 4;
      background: rgba(15, 15, 15, 0.98);
    }

    .chip-row::-webkit-scrollbar {
      display: none;
    }

    .topic-chip {
      border: 0;
      border-radius: 12px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.08);
      color: #f4f4f5;
      white-space: nowrap;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .topic-chip.active {
      background: linear-gradient(135deg, #f6f6f7, #d9d9dd);
      color: #111;
      box-shadow: 0 10px 26px rgba(255,255,255,0.08);
    }

    .topic-chip:hover {
      transform: translateY(-1px);
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 30px 18px;
    }

    .video-card {
      border-radius: 22px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: var(--shadow-soft);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .thumbnail {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #232323;
      object-fit: cover;
      display: block;
      border-radius: 20px 20px 0 0;
      transition: transform 0.45s ease, filter 0.3s ease;
    }

    .video-body {
      padding: 12px 0 0;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 12px;
    }

    .channel-avatar {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: linear-gradient(135deg, #3b82f6, #0ea5e9);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      display: grid;
      place-items: center;
      margin-top: 4px;
    }

    .video-copy h3 {
      margin: 0 0 8px;
      font-size: 17px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .video-card {
      cursor: pointer;
    }

    .video-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 28px 60px rgba(0, 0, 0, 0.34);
      border-color: rgba(255,255,255,0.1);
    }

    .video-card:hover .thumbnail {
      transform: scale(1.03);
      filter: saturate(1.05) contrast(1.04);
    }

    .video-meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .video-description {
      display: none;
    }

    .card-actions button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--panel-strong);
      color: var(--text);
      font-weight: 700;
    }

    .card-actions button.primary {
      background: #fff;
      color: #111;
    }

    .panel {
      padding: 0;
    }

    .watch-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.9fr) minmax(320px, 0.9fr);
      gap: 20px;
    }

    .watch-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.82fr) minmax(320px, 0.78fr);
      gap: 18px;
      align-items: start;
    }

    .watch-main,
    .watch-rail {
      min-width: 0;
    }

    .player-stage {
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.06);

    function openUserMenuSubmenu(config, triggerButton) {
      const preferences = getPreferences();
      userMenuSubmenu.innerHTML = `
        <div class="user-menu-submenu-header">
          <button id="userMenuBackButton" class="user-menu-back" type="button" aria-label="Back">&larr;</button>
          <div class="user-menu-submenu-title">${escapeHtml(config.title)}</div>
        </div>
        <div class="user-menu-list">
          ${config.options
            .map((option) => `
              <button class="user-menu-item" type="button" data-submenu-option="${escapeHtml(option)}">
                <span class="user-menu-item-left">
                  <span class="user-menu-item-icon">${preferences[config.key] === option ? "•" : " "}</span>
                  <span>${escapeHtml(option)}</span>
                </span>
              </button>
            `)
            .join("")}
        </div>
      `;
      userMenuSubmenu.hidden = false;
      userMenuSubmenu.scrollTop = 0;
      userMenuSubmenu.style.visibility = "hidden";

      const menuRect = userMenu.getBoundingClientRect();
      const triggerRect = triggerButton.getBoundingClientRect();
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const submenuWidth = userMenuSubmenu.offsetWidth || 320;
      const submenuHeight = userMenuSubmenu.offsetHeight || 320;
      const gap = 12;

      let left = menuRect.right + gap;
      if (left + submenuWidth > viewportWidth - 12) {
        left = menuRect.left - submenuWidth - gap;
      }
      if (left < 12) {
        left = Math.max(12, viewportWidth - submenuWidth - 12);
      }

      let top = triggerRect.top - 12;
      if (top + submenuHeight > viewportHeight - 12) {
        top = Math.max(12, viewportHeight - submenuHeight - 12);
      }
      if (top < 12) {
        top = 12;
      }

      userMenuSubmenu.style.left = `${Math.round(left)}px`;
      userMenuSubmenu.style.top = `${Math.round(top)}px`;
      userMenuSubmenu.style.visibility = "visible";

      document.getElementById("userMenuBackButton").addEventListener("click", () => {
        closeUserMenuSubmenu();
        userMenu.scrollTop = 0;
      });

      userMenuSubmenu.querySelectorAll("[data-submenu-option]").forEach((button) => {
        button.addEventListener("click", () => {
          savePreferences({ [config.key]: button.dataset.submenuOption });
          applyTheme();
          renderUserMenuLabels();
          openUserMenuSubmenu(config, triggerButton);
          setStatus(`${config.title} updated to ${button.dataset.submenuOption}.`);
        });
      });
    }

    function buildNotifications() {
      const items = [];

      state.feed.slice(0, 8).forEach((video) => {
        if ((video.commentsCount || 0) > 0) {
          items.push({
            type: "comment",
            videoId: video.videoId,
            creatorName: video.creatorName,
            message: `${video.creatorName} received ${formatNumber(video.commentsCount)} comment${video.commentsCount === 1 ? "" : "s"} on "${video.title}"`,
            createdAt: video.updatedAt || video.createdAt,
            thumbnailUrl: video.thumbnailUrl
          });
        }

        if ((video.likes || 0) > 0) {
          items.push({
            type: "like",
            videoId: video.videoId,
            creatorName: video.creatorName,
            message: `"${video.title}" has ${formatNumber(video.likes)} like${video.likes === 1 ? "" : "s"} right now`,
            createdAt: video.updatedAt || video.createdAt,
            thumbnailUrl: video.thumbnailUrl
          });
        }

        if ((video.views || 0) > 0) {
          items.push({
            type: "views",
            videoId: video.videoId,
            creatorName: video.creatorName,
            message: `${video.creatorName} uploaded "${video.title}" and it has ${formatNumber(video.views)} views`,
            createdAt: video.createdAt,
            thumbnailUrl: video.thumbnailUrl
          });
        }
      });

      return items
        .sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime())
        .slice(0, 12);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatNumber(value) {
      return new Intl.NumberFormat().format(Number(value) || 0);
    }

    function formatDuration(seconds) {
      const totalSeconds = Math.max(0, Math.round(Number(seconds) || 0));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const remainingSeconds = totalSeconds % 60;

      if (hours > 0) {
        return `${hours}h ${minutes}m`;
      }

      if (minutes > 0) {
        return `${minutes}m ${remainingSeconds}s`;
      }

      return `${remainingSeconds}s`;
    }

    function createThumbnailDataUrl({ title, label, accentA, accentB }) {
      const safeTitle = escapeHtml(title);
      const safeLabel = escapeHtml(label);
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
          <defs>
            <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="${accentA}"/>
              <stop offset="100%" stop-color="${accentB}"/>
            </linearGradient>
          </defs>
          <rect width="1280" height="720" fill="url(#bg)"/>
          <circle cx="1040" cy="170" r="150" fill="rgba(255,255,255,0.16)"/>
          <circle cx="180" cy="580" r="220" fill="rgba(0,0,0,0.18)"/>
          <rect x="66" y="66" rx="28" ry="28" width="170" height="52" fill="rgba(15,15,15,0.52)"/>
          <text x="151" y="100" text-anchor="middle" fill="#ffffff" font-size="28" font-family="Arial, sans-serif" font-weight="700">${safeLabel}</text>
          <text x="70" y="515" fill="#ffffff" font-size="72" font-family="Arial, sans-serif" font-weight="800">${safeTitle}</text>
          <polygon points="1110,540 1110,650 1210,595" fill="#ffffff"/>
        </svg>
      `.trim();

      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function normalizeVideoForDisplay(video, index = 0) {
      const template = demoVideoTemplates[index % demoVideoTemplates.length];
      return {
        ...video,
        title: video.title || template.title,
        description: video.description || template.description,
        thumbnailUrl: video.thumbnailUrl || createThumbnailDataUrl(template)
      };

    function getDisplayFeed(videos) {

    function formatTagLabel(tag) {
      return String(tag || "")
        .split(/[\s-]+/)
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(" ");
    }

    function getInitials(value) {
      return String(value || "VC")
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0])
        .join("")
        .toUpperCase();
    }

    function buildCreatorSummary(videos) {
      const map = new Map();

      videos.forEach((video) => {
        const key = video.creatorName || "Unknown Creator";
        const existing = map.get(key) || {
          creatorName: key,
          videos: 0,
          views: 0
        };

        existing.videos += 1;
        existing.views += Number(video.views) || 0;
        map.set(key, existing);
      });

      return Array.from(map.values()).sort((a, b) => b.views - a.views || b.videos - a.videos);
    }

  async function fetchJson(endpoint, options) {
  const url = `${apiBaseUrl}${endpoint}`;

  const response = await fetch(url, options);

  let data = null;
  try {
    data = await response.json();
  } catch {
    data = null;
  }

  if (!response.ok) {
    throw new Error(data?.error || "Request failed.");
  }

  return data;
}

    function applySearch(query) {
      const normalizedQuery = (query || "").trim().toLowerCase();
      searchInput.value = query || "";

      if (!normalizedQuery) {
        state.filteredFeed = [...state.feed];
        return;
      }

      state.filteredFeed = state.feed.filter((video) => {
        return [video.title, video.creatorName, video.description, ...(Array.isArray(video.tags) ? video.tags : [])]
          .join(" ")
          .toLowerCase()
          .includes(normalizedQuery);
      });
    }

    function navigate(nextRoute, options = {}) {
      state.route = {
        view: nextRoute.view || "home",
        videoId: nextRoute.videoId || "",
        creatorName: nextRoute.creatorName || "",
        q: nextRoute.q || ""
      };

      const params = new URLSearchParams();
      if (state.route.view && state.route.view !== "home") {
        params.set("view", state.route.view);
      }
      if (state.route.videoId) {
        params.set("videoId", state.route.videoId);
      }
      if (state.route.creatorName) {
        params.set("creatorName", state.route.creatorName);
      }
      if (state.route.q) {
        params.set("q", state.route.q);
      }

      const nextUrl = `${window.location.pathname}${params.toString() ? `?${params.toString()}` : ""}`;

      if (options.replace) {
        window.history.replaceState({}, "", nextUrl);
      } else {
        window.history.pushState({}, "", nextUrl);
      }

      renderRoute();
    }

    async function reportWatchAnalytics(payload) {
      if (!currentVideoId) {
        return;
      }

      try {
       await fetch(`https://vibecast-backend-yuam.onrender.com/api/videos/${currentVideoId}/analytics/watch`, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
          body: JSON.stringify(payload),
          keepalive: true
        });
      } catch (error) {
        console.error("Analytics reporting failed.", error);
      }
    }

    function captureWatchProgress(video, options = {}) {
      if (!video || video.paused || video.ended || Number.isNaN(video.currentTime)) {
        return;
      }

      const watchedSeconds = Math.floor(video.currentTime);
      const delta = watchedSeconds - reportedWatchSeconds;

      if (delta >= 10) {
        reportedWatchSeconds = watchedSeconds;
        reportWatchAnalytics({ watchedSeconds: delta, completed: false });
      }

      if (options.completed && !completionReported) {
        completionReported = true;
        reportWatchAnalytics({ watchedSeconds: 0, completed: true });
      }
    }

    function bindAnalytics(video) {
      clearAnalyticsInterval();
      reportedWatchSeconds = 0;
      completionReported = false;

      analyticsInterval = window.setInterval(() => {
        captureWatchProgress(video);
      }, 10000);

      video.addEventListener("ended", () => {
        captureWatchProgress(video, { completed: true });
      });
    }

      const muted = Boolean(video.muted);

            <path d="M11 5 6 9H3v6h3l5 4z"></path>
            <path d="M16 9a5 5 0 0 1 0 6"></path>
            <path d="M18.5 6.5a9 9 0 0 1 0 11"></path>

      if (!video) {

      destroyPlayer();
      video.playsInline = true;

        renderAudioToggleState(video, audioToggleButton);
      };

      if (audioToggleButton) {
        audioToggleButton.addEventListener("click", async () => {
          video.muted = !video.muted;
          syncAudioButton();

          try {
            await video.play();
          } catch (error) {
            video.muted = true;
            syncAudioButton();
          }
        });
      }

      const attemptAutoplay = async () => {
        try {
          video.muted = false;
          await video.play();
        } catch (error) {
          try {
            video.muted = true;
            await video.play();
          } catch (playError) {
            video.controls = true;
          }
        }

        syncAudioButton();
      };

      video.addEventListener("volumechange", syncAudioButton);

      if (video.canPlayType(HLS_MIME_TYPE)) {
        video.src = streamUrl;
        video.addEventListener("loadedmetadata", () => {
          attemptAutoplay();
        }, { once: true });
        bindAnalytics(video);
        return;
      }

      if (window.Hls && window.Hls.isSupported()) {
        hlsInstance = new window.Hls({ enableWorker: true });
        hlsInstance.loadSource(streamUrl);
        hlsInstance.attachMedia(video);
        video.addEventListener("loadedmetadata", () => {
          attemptAutoplay();
        }, { once: true });
        bindAnalytics(video);
      }

      syncAudioButton();
    }

        </section>
      `;

        event.preventDefault();
        const formData = new FormData(form);
        uploadStatus.textContent = "Uploading and transcoding...";

        try {
        const response = await fetch(`${apiBaseUrl}/api/videos/upload`, {
  method: "POST",
  
  body: formData
});
          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Upload failed.");
          }

          uploadStatus.textContent = `Upload accepted.\nVideo ID: ${data.video.videoId}\nOpening watch page...`;
          await loadFeed();
          navigate({
            view: "watch",
            videoId: data.video.videoId,
            creatorName: data.video.creatorName,
            q: state.route.q
          });
        } catch (error) {
          uploadStatus.textContent = error.message;
        }
      });
    }

    async function renderRoute() {
      appShell.classList.toggle("watch-mode", state.route.view === "watch");
      if (state.route.view !== "watch") {
        closeSidebarOverlay();
      }
      updateNavState();
      applySearch(state.route.q || "");

      if (state.route.view === "watch") {
        await renderWatch();
        return;
      }

      if (state.route.view === "upload") {
        renderUpload();
        return;
      }

      if (state.route.view === "user") {
        renderUserPage();
        return;
      }

      if (state.route.view === "creator") {
        await renderCreator();
        return;
      }

      if (state.route.view === "account-hub") {
        renderAccountHub();
        return;
      }

      if (state.route.view === "account") {
        renderGoogleAccountPage();
        return;
      }

      if (state.route.view === "memberships") {
        renderMembershipsPage();
        return;
      }

      if (state.route.view === "data") {
        renderDataPage();
        return;
      }

      if (state.route.view === "switch-account") {
        renderSwitchAccountPage();
        return;
      }

      if (state.route.view === "signed-out") {
        renderSignedOutPage();
        return;
      }

      if (state.route.view === "shortcuts") {
        renderKeyboardShortcutsPage();
        return;
      }

      if (state.route.view === "help") {
        renderHelpPage();
        return;
      }

      if (state.route.view === "feedback") {
        renderFeedbackPage();
        return;
      }

      if (state.route.view === "language") {
        renderSimplePreferencePage({
          key: "displayLanguage",
          title: "Display language",
          description: "Choose the language used across your account surfaces and navigation labels.",
          options: ["English", "Hindi", "Spanish", "French", "German"]
        });
        return;
      }

      if (state.route.view === "location") {
        renderSimplePreferencePage({
          key: "location",
          title: "Location",
          description: "Set a preferred region for recommendations, trends, and localized account behavior.",
          options: ["India", "United States", "United Kingdom", "Canada", "Australia"]
        });
        return;
      }

      renderHome();
    }

    document.addEventListener("click", (event) => {
      if (!userMenu.hidden && !userMenu.contains(event.target) && !profileButton.contains(event.target)) {
        closeUserMenu();
      }
      if (!userMenuSubmenu.hidden && !userMenuSubmenu.contains(event.target) && !userMenu.contains(event.target)) {
        closeUserMenuSubmenu();
      }
      if (!notificationsPanel.hidden && !notificationsPanel.contains(event.target) && !surpriseButton.contains(event.target)) {
        closeNotifications();
      }
    });

    window.addEventListener("popstate", () => {
      state.route = parseRoute();
      renderRoute();
    });

    window.addEventListener("beforeunload", () => {
      const video = document.getElementById("watchPlayer");
      if (video) {
        captureWatchProgress(video);
      }
      destroyPlayer();
      clearRefreshTimer();
      clearAnalyticsInterval();
    });

    async function boot() {
      setStatus("Loading Vibecast...");

      try {
        applyTheme();
        renderUserMenuLabels();
        await loadFeed();
        state.route = parseRoute();
        await renderRoute();
        setStatus("");
      } catch (error) {
        setStatus(error.message);
        content.innerHTML = `<div class="empty-state">${escapeHtml(error.message)}</div>`;
      }
    }

    boot();
